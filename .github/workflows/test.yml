name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - 
        name: Checkout
        uses: actions/checkout@v4
      - 
        name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - 
        name: Install dependencies
        run: go mod tidy
      - 
        name: Build
        run: go build -o bw main.go
      - 
        name: Test
        run: ./bw version
      - 
        name: Check GoReleaser config
        run: goreleaser check